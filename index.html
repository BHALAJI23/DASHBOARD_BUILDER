<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Dashboard Builder - Create custom analytics dashboards with drag-and-drop widgets">
    <meta name="theme-color" content="#FFE500">
    <title>Dashboard Builder Pro</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- CSS Links -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/gridstack.css">

    <!-- External Libraries CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gridstack.js/10.1.2/gridstack-all.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/+esm" type="module"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>
    <!-- App Container -->
    <div id="app"></div>

    <!-- Main Application Container -->
    <div id="main-app" style="display: none;">
        <!-- Navigation Bar -->
        <nav class="navbar">
            <div class="navbar-content">
                <div class="navbar-brand">
                    <h1>📊 Dashboard Builder</h1>
                </div>
                <div class="navbar-menu">
                    <button id="orders-btn" class="nav-btn">Orders</button>
                    <button id="dashboard-btn" class="nav-btn active">Dashboard</button>
                    <button id="logout-btn" class="nav-btn logout-btn">Logout</button>
                </div>
            </div>
        </nav>

        <!-- Content Area -->
        <div id="content-area">
            <!-- Orders Section -->
            <div id="orders-section" class="section" style="display: none;"></div>

            <!-- Dashboard Section -->
            <div id="dashboard-section" class="section"></div>
        </div>
    </div>

    <!-- Single entry point -->
    <script type="module" src="js/app.js"></script>
</body>

</html>
